<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeLink - Blood Donor Connection</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="app">
      <!-- Navigation -->
      <nav class="navbar">
        <div class="logo">LifeLink</div>
        <div class="nav-buttons">
          <button onclick="showLoginForm()">Login</button>
          <button onclick="showRegisterForm()">Register</button>
        </div>
      </nav>

      <!-- Hero Section -->
      <section class="hero">
        <h1>Connect Blood Donors with Patients</h1>
        <p>Save lives by connecting blood donors with patients in need</p>
        <button class="cta-button" onclick="showRegisterForm()">Join Now</button>
      </section>

      <!-- Features Section -->
      <section class="features">
        <div class="feature-card">
          <h3>Find Donors</h3>
          <p>Quickly locate blood donors in your area</p>
        </div>
        <div class="feature-card">
          <h3>Emergency Requests</h3>
          <p>Post urgent blood requirements</p>
        </div>
        <div class="feature-card">
          <h3>Save Lives</h3>
          <p>Make a difference in someone's life</p>
        </div>
      </section>

      <!-- Login Modal -->
      <div id="loginModal" class="modal">
        <div class="modal-content">
          <span class="close" onclick="closeModal('loginModal')">&times;</span>
          <h2>Login</h2>
          <form id="loginForm" onsubmit="handleLogin(event)">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
          </form>
        </div>
      </div>

      <!-- Register Modal -->
      <div id="registerModal" class="modal">
        <div class="modal-content">
          <span class="close" onclick="closeModal('registerModal')">&times;</span>
          <h2>Register</h2>
          <form id="registerForm" onsubmit="handleRegister(event)">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="text" placeholder="Address" required>
            <select required>
              <option value="">Select Blood Group</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
            </select>
            <input type="password" placeholder="Password" required>
            <!-- <input type="password" placeholder="Confirm Password" required> -->
            <button type="submit">Register</button>
          </form>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>

</html>
